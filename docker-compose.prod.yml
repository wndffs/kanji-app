services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kanji_srs}
      POSTGRES_USER: ${POSTGRES_USER:-kanji}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in an untracked env file}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    profiles: ["ops"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migrator
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-kanji}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in an untracked env file}@postgres:5432/${POSTGRES_DB:-kanji_srs}?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "db:migrate:deploy"]
    restart: "no"

  seed:
    profiles: ["ops"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migrator
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-kanji}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in an untracked env file}@postgres:5432/${POSTGRES_DB:-kanji_srs}?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "db:seed"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    environment:
      NODE_ENV: production
      PORT: 3001
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-kanji}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in an untracked env file}@postgres:5432/${POSTGRES_DB:-kanji_srs}?schema=public"
      REDIS_URL: redis://redis:6379
      AUTH_MODE: local
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?Set AUTH_TOKEN_SECRET in an untracked env file}
      AUTH_SESSION_TTL_MINUTES: ${AUTH_SESSION_TTL_MINUTES:-43200}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runtime
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
        NEXT_PUBLIC_DEV_AUTH_EMAIL: ${NEXT_PUBLIC_DEV_AUTH_EMAIL:-}
        NEXT_PUBLIC_DEV_AUTH_PASSWORD: ${NEXT_PUBLIC_DEV_AUTH_PASSWORD:-}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  postgres-prod-data:
  redis-prod-data:
