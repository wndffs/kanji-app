services:
  - type: web
    name: kanji-srs-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerContext: .
    dockerfilePath: ./apps/api/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: AUTH_MODE
        value: local
      - key: AUTH_SESSION_TTL_MINUTES
        value: "43200"
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
